name: Security Analysis

on:
  workflow_call:
    outputs:
      sonar_result:
        description: SonarQube job result
        value: ${{ jobs.results.outputs.sonar }}
      gitleaks_result:
        description: Gitleaks job result
        value: ${{ jobs.results.outputs.gitleaks }}
      semgrep_result:
        description: Semgrep job result
        value: ${{ jobs.results.outputs.semgrep }}
      trivy_result:
        description: Trivy job result
        value: ${{ jobs.results.outputs.trivy }}

permissions:
  contents: read

jobs:
  sonar:
    name: SonarQube Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: >-
      (github.event_name == 'pull_request' &&
       github.event.pull_request.base.ref == github.event.repository.default_branch) ||
      (github.event_name != 'pull_request' &&
       github.ref_name == github.event.repository.default_branch)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Download Ruff report
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sonar-ruff-report
          path: .reports

      - name: Download codespell report
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sonar-codespell-report
          path: .reports

      - name: Download yamllint report
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: sonar-yamllint-report
          path: .reports

      - name: Ensure report files exist
        run: |
          mkdir -p .reports
          [ -f .reports/ruff.json ] || printf '[]\n' > .reports/ruff.json
          for report in codespell-sonar.json yamllint-sonar.json; do
            [ -f ".reports/$report" ] || printf '{"rules":[],"issues":[]}\n' > ".reports/$report"
          done

      - name: Validate SonarQube configuration
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          SONAR_TOKEN="$(printf '%s' "$SONAR_TOKEN" | tr -d '\r\n')"
          SONAR_HOST_URL="$(printf '%s' "$SONAR_HOST_URL" | tr -d '\r\n')"
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ]; then
            echo "SONAR_TOKEN and SONAR_HOST_URL must be configured as repository secrets." >&2
            exit 1
          fi
          printf 'SONAR_TOKEN=%s\n' "$SONAR_TOKEN" >> "$GITHUB_ENV"
          printf 'SONAR_HOST_URL=%s\n' "$SONAR_HOST_URL" >> "$GITHUB_ENV"

      - name: Ensure SonarQube project exists
        env:
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          import pathlib
          import urllib.error
          import urllib.parse
          import urllib.request

          sonar_host = os.environ["SONAR_HOST_URL"].rstrip("/")
          sonar_token = os.environ["SONAR_TOKEN"]
          repo = os.environ["GH_REPOSITORY"]

          props = pathlib.Path("sonar-project.properties")
          project_key = ""
          project_name = repo.rsplit("/", 1)[-1]
          if props.exists():
              for line in props.read_text().splitlines():
                  line = line.strip()
                  if line.startswith("sonar.projectKey="):
                      project_key = line.split("=", 1)[1].strip()
                  elif line.startswith("sonar.projectName="):
                      project_name = line.split("=", 1)[1].strip()
          if not project_key:
              project_key = repo.replace("/", "_")
              props.write_text(
                  f"sonar.projectKey={project_key}\n"
                  f"sonar.projectName={project_name}\n"
                  "sonar.sources=.\n"
                  "sonar.exclusions=**/.git/**,**/.venv/**,**/venv/**,**/node_modules/**,**/dist/**,**/build/**,**/__pycache__/**\n"
              )

          auth = base64.b64encode((sonar_token + ":").encode()).decode()

          def request(path, data=None):
              encoded = urllib.parse.urlencode(data or {}).encode()
              req = urllib.request.Request(f"{sonar_host}{path}", data=encoded, method="POST")
              req.add_header("Authorization", f"Basic {auth}")
              try:
                  with urllib.request.urlopen(req, timeout=20) as response:
                      return response.status, response.read().decode()
              except urllib.error.HTTPError as exc:
                  return exc.code, exc.read().decode()

          status, body = request(
              "/api/projects/create",
              {"project": project_key, "name": project_name},
          )
          if status in (200, 204, 400) and ("already exists" in body.lower() or status != 400):
              print(f"SonarQube project ready: {project_key}")
          elif status in (401, 403):
              print(
                  "Project provisioning is not permitted by this analysis token; "
                  "continuing with the existing project."
              )
          else:
              raise SystemExit(
                  f"Unable to create SonarQube project {project_key}: HTTP {status} {body}"
              )
          PY

      - name: SonarQube scan
        uses: sonarsource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        with:
          args: >-
            -Dsonar.qualitygate.wait=true
            -Dsonar.python.ruff.reportPaths=.reports/ruff.json
            -Dsonar.externalIssuesReportPaths=.reports/codespell-sonar.json,.reports/yamllint-sonar.json

  secrets-scan:
    name: Gitleaks Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.30.1@sha256:b109bc5f8f76a38196a3e413704fc5b9e3c32360bce4e4b603bd6f45b3721dbb \
            detect --source . --no-git --no-banner --redact --exit-code 1

  sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: semgrep/semgrep:1.169.0@sha256:a40de619d5f2ede141f64ce73a1e8a5b2b00ca32e607fb20c8f6671f3190e604
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Semgrep
        run: >-
          semgrep ci
          --config p/security-audit
          --config p/secrets
          --exclude-rule generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key

  deps-scan:
    name: Trivy Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table
          output: trivy-results.txt

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trivy-results
          path: trivy-results.txt
          retention-days: 7

  results:
    name: Security Results
    runs-on: ubuntu-latest
    needs: [sonar, secrets-scan, sast, deps-scan]
    if: always()
    outputs:
      sonar: ${{ steps.results.outputs.sonar }}
      gitleaks: ${{ steps.results.outputs.gitleaks }}
      semgrep: ${{ steps.results.outputs.semgrep }}
      trivy: ${{ steps.results.outputs.trivy }}
    steps:
      - name: Export results
        id: results
        env:
          SONAR_RESULT: ${{ needs.sonar.result }}
          GITLEAKS_RESULT: ${{ needs.secrets-scan.result }}
          SEMGREP_RESULT: ${{ needs.sast.result }}
          TRIVY_RESULT: ${{ needs.deps-scan.result }}
        run: |
          {
            printf 'sonar=%s\n' "$SONAR_RESULT"
            printf 'gitleaks=%s\n' "$GITLEAKS_RESULT"
            printf 'semgrep=%s\n' "$SEMGREP_RESULT"
            printf 'trivy=%s\n' "$TRIVY_RESULT"
          } >> "$GITHUB_OUTPUT"
